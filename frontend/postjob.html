<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Job</title>
</head>
<body>
    <div class="container">
        <h1>Post Job</h1>
        <form id="postJobForm">
            <input type="text" id="title" placeholder="Job Title" required>
            <input type="text" id="description" placeholder="Job Description" required>
            <input type="text" id="skills" placeholder="Skills Required" required>
            <input type="text" id="stipend" placeholder="Stipend" required>
            <input type="date" id="deadline" placeholder="Deadline" required>
            <button type="submit">Post Job</button>
        </form>
    </div>
    <script>
        const postJobForm = document.getElementById('postJobForm');
        postJobForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const skills = document.getElementById('skills').value;
            const stipend = document.getElementById('stipend').value;
            const deadline = document.getElementById('deadline').value;
            const token = localStorage.getItem('access_token');
            const response = await fetch('http://localhost:8000/postjob/', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ title, description, skills, stipend, deadline })
            });
            const data = await response.json();
            if (response.ok) {
                alert('Job posted successfully');
                window.location.href = 'dashboard.html';
            } else {
                // Format the error object into a readable string
                let errorMessage = 'Job not posted: ';
                if (typeof data === 'object') {
                    errorMessage += Object.entries(data)
                        .map(([key, value]) => `${key}: ${Array.isArray(value) ? value.join(', ') : value}`)
                        .join('\n');
                } else {
                    errorMessage += 'Unknown error';
                }
                alert(errorMessage);
            }
        });
    </script>
</body>
</html>
