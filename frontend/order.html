<!DOCTYPE html>
<html>
<head>
<title>My Orders</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<script src="config.js"></script>
<link rel="stylesheet" href="notifications.css">
<script src="notifications.js"></script>

<style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Segoe UI, sans-serif;
      /* Firefox */
      scrollbar-width: thin;
      scrollbar-color: #38bdf8 #020617;
    }

    /* CUSTOM SCROLLBAR (Webkit) */
    ::-webkit-scrollbar {
      width: 7px;
    }
    ::-webkit-scrollbar-track {
      background: #020617;
    }
    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 10px;
      border: 1px solid #020617;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #38bdf8;
    }

body{
background:#020617;
color:white;
}

/* NAVBAR */

.navbar{
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
border-bottom:1px solid rgba(56,189,248,0.3);
}

.logo{
color:#38bdf8;
font-size:1.5rem;
font-weight:bold;
}

.nav-links{
display:flex;
gap:30px;
list-style:none;
}

.nav-links li{
cursor:pointer;
font-size:18px;
color:#cbd5f5;
}

.nav-links li:hover{
color:#38bdf8;
}

/* PAGE */

.container{
padding:40px;
}

.title{
font-size:32px;
margin-bottom:30px;
}

/* ORDER CARD */

.orders-container{
display:flex;
flex-direction:column;
gap:20px;
max-width:900px;
}

.order-card{
background:#0f172a;
border:1px solid rgba(56,189,248,0.3);
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(56,189,248,0.1);
}

.order-title{
font-size:20px;
font-weight:600;
margin-bottom:10px;
}

.order-info{
color:#94a3b8;
margin-bottom:6px;
}

.status{
margin-top:10px;
padding:5px 10px;
border-radius:6px;
display:inline-block;
font-size:14px;
}

.pending{
background:#facc15;
color:black;
}

.progress{
background:#38bdf8;
color:black;
}

.delivered{
background:#22c55e;
color:black;
}

.rejected {
  background: #ef4444;
  color: white;
}


.review-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.8);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.review-box {
  background: #0f172a;
  padding: 30px;
  border-radius: 15px;
  width: 400px;
  border: 1px solid #38bdf8;
  box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
}

.star-rating {
  font-size: 32px;
  cursor: pointer;
  margin: 10px 0;
}

.star {
  color: #475569;
  transition: 0.2s;
}

.star:hover, .star.active {
  color: #facc15;
}

.review-btn {
  margin-top: 15px;
  padding: 8px 16px;
  background: #38bdf8;
  color: #020617;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}



.submit-modal {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  display:none; justify-content:center; align-items:center;
  z-index:1100;
}
.submit-box {
  background:#0f172a;
  padding:30px;
  border-radius:15px;
  width:440px;
  border:1px solid #38bdf8;
  box-shadow:0 0 30px rgba(56,189,248,0.2);
}
.submit-box h3 { color:#38bdf8; margin-bottom:16px; }
.submit-box label { display:block; margin-bottom:4px; color:#94a3b8; font-size:14px; }
.submit-box textarea, .submit-box input[type="url"] {
  width:100%; padding:10px;
  background:#020617; color:white;
  border:1px solid rgba(56,189,248,0.3);
  border-radius:8px; font-size:14px; margin-bottom:12px;
}
.submit-box textarea { height:90px; resize:none; }
/* =========================
   📱 MOBILE (max 600px)
========================= */
@media (max-width: 600px) {

  /* NAVBAR */
  .navbar {
    flex-direction: column;
    height: auto;
    padding: 15px 20px;
    align-items: flex-start;
    gap: 10px;
  }

  .nav-links {
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }

  .nav-links li {
    font-size: 1rem;
  }

  /* PAGE */
  .container {
    padding: 20px;
  }

  .title {
    font-size: 1.8rem;
    margin-bottom: 20px;
  }

  /* ORDERS */
  .orders-container {
    max-width: 100%;
  }

  .order-card {
    padding: 15px;
  }

  .order-title {
    font-size: 1rem;
  }

  .order-info {
    font-size: 0.9rem;
  }

  .status {
    font-size: 0.75rem;
    padding: 4px 8px;
  }

  /* LOAD MORE BUTTON */
  #loadMoreBtn {
    padding: 10px;
    font-size: 0.9rem;
  }

  /* REVIEW MODAL */
  .review-box {
    width: 90%;
    padding: 20px;
  }

  .star-rating {
    font-size: 24px;
  }

  textarea {
    font-size: 0.9rem;
  }

  /* SUBMIT WORK MODAL */
  .submit-box {
    width: 90%;
    padding: 20px;
  }

  .submit-box textarea,
  .submit-box input {
    font-size: 0.9rem;
    padding: 8px;
  }

  /* BUTTONS INSIDE MODALS */
  .review-box button,
  .submit-box button {
    font-size: 0.9rem;
    padding: 8px;
  }
}
</style>
</head>

<body>

<nav class="navbar">

<div class="logo">LensLink<i class="fa-solid fa-camera-retro"></i></div>

<ul class="nav-links">
<li onclick="goDashboard()">Dashboard</li>
<li onclick="goBrowse()">Browse</li>
<li onclick="goMessages()">Messages</li>
<li onclick="goProfile()">Profile</li>
</ul>

</nav>

<div class="container">

<div class="title">My Bookings</div>

<div class="orders-container" id="ordersContainer"></div>

<div id="loadMoreContainer" style="max-width: 900px; text-align: center; margin: 40px 0; display: none;">
    <button id="loadMoreBtn" onclick="loadMore()" style="background: #38bdf8; color: #020617; font-weight: bold; padding: 12px 30px; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; width: 100%;">
        Load More Orders
    </button>
</div>

</div>

<!-- REVIEW MODAL -->
<div class="review-modal" id="reviewModal">
  <div class="review-box">
    <h3 style="color:#38bdf8; margin:0;">Leave a Review</h3>

    <label style="display:block; margin-top:10px;">Rating</label>
    <div class="star-rating" id="starRating">
      <span class="star" data-value="1">★</span>
      <span class="star" data-value="2">★</span>
      <span class="star" data-value="3">★</span>
      <span class="star" data-value="4">★</span>
      <span class="star" data-value="5">★</span>
    </div>

    <input type="hidden" id="ratingInput" value="0">

    <label style="display:block; margin-top:10px;">Review</label>
    <textarea id="reviewText" placeholder="Write your feedback..." style="width:100%; height:100px; padding:10px; background:#020617; color:white; border:1px solid rgba(56,189,248,0.3); border-radius:8px; resize:none;"></textarea>

    <div style="display:flex; gap:10px; margin-top:15px;">
      <button id="submitReviewBtn" onclick="submitReview()" style="flex:1; padding:10px; background:#38bdf8; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Submit</button>
      <button onclick="closeReviewModal()" style="flex:1; padding:10px; background:#334155; border:none; border-radius:8px; color:white; cursor:pointer;">Cancel</button>
    </div>
  </div>
</div>

<script src="order.js"></script>


<!-- SUBMIT WORK MODAL -->
<div class="submit-modal" id="submitWorkModal">
  <div class="submit-box">
    <h3>Submit Your Work</h3>
    <label>Description</label>
    <textarea id="submitText" placeholder="Describe what you delivered..."></textarea>
    <label>Link (Google Drive, GitHub etc.)</label>
    <input type="url" id="submitLink" placeholder="https://...">
    <div style="display:flex; gap:10px;">
      <button id="submitWorkBtn" onclick="submitWork()" style="flex:1; padding:10px; background:#38bdf8; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Submit</button>
      <button onclick="closeSubmitModal()" style="flex:1; padding:10px; background:#334155; border:none; border-radius:8px; color:white; cursor:pointer;">Cancel</button>
    </div>
  </div>
</div>

</body>

</html>
