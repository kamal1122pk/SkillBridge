<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script src="config.js"></script>
  <link rel="stylesheet" href="notifications.css">
  <script src="notifications.js"></script>
  <title>Photographer Dashboard</title>
  <script src="authGuard.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
      /* Firefox */
      scrollbar-width: thin;
      scrollbar-color: #38bdf8 #020617;
    }
:root {
  --navbar-height: 70px;
}
    /* CUSTOM SCROLLBAR (Webkit) */
    ::-webkit-scrollbar {
      width: 7px;
    }
    ::-webkit-scrollbar-track {
      background: #068cc6;
    }
    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 10px;
      border: 1px solid #020617;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #056f9c;
    }

    body {
      background-color: #020617;
      color: #e5e7eb;
    }

    /* NAVBAR */
    .navbar {
      /* height: 70px; */
      
  height: var(--navbar-height);

      background: #020617;
      border-bottom: 1px solid rgba(56, 189, 248, 0.3);

      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      position: fixed;
      width: 100%;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: bold;
      color: #38bdf8;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 30px;
      font-size: larger;
    }

    .nav-links li {
      cursor: pointer;
      color: #cbd5f5;
    }

    .nav-links li:hover {
      color: #38bdf8;
    }

    .user-name {
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* MAIN CONTENT */
    .dashboard-container {
      /* padding: 40px; */
       padding-top: calc(var(--navbar-height) + 20px);
    }

    .dashboard-title {
      margin-top: 80px;
      font-size: 2rem;
      margin-bottom: 90px;
    }

    /* CARDS */
 .dashboard-cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}

    .dashboard-card {
      background: linear-gradient(145deg, #0f172a, #020617);
      border-radius: 20px;
      padding: 40px;
      min-height: 300px;

      display: flex;
      align-items: center;

      box-shadow: 0 0 30px rgba(56, 189, 248, 0.15);
      border: 1px solid #38bdf8;

      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .dashboard-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 50px rgba(56, 189, 248, 0.35);
    }

    .dashboard-card h3 {
      font-size: 1.5rem;
      margin-bottom: 10px;

    }

    .dashboard-card p {
      font-size: 2.2rem;
      font-weight: bold;
      color: #38bdf8;
    }

    p.subHeading {
      font-size: 1.2rem;
      color: #acb1b7;
      font-weight: lighter;
    }

    /* PAYMENT VERIFICATION */

    .verification-section {
      margin-top: 60px;
    }

    .verification-title {
      font-size: 1.6rem;
      margin-bottom: 20px;
    }


    .verification-card {
      background: linear-gradient(145deg, #0f172a, #020617);
      border: 1px solid #38bdf8;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
    }

    .verification-card h3 {
      margin-bottom: 10px;
    }

    .verify-buttons {
      margin-top: 15px;
    }

    .verify-buttons button {
      padding: 8px 16px;
      margin-right: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }

    .confirm-btn {
      background: #22c55e;
      color: white;
    }

    .reject-btn {
      background: #ef4444;
      color: white;
    }
    /* =========================
   📱 MOBILE (max 600px)
========================= */
@media (max-width: 600px) {

  .navbar {
    flex-direction: column;
    height: auto;
    padding: 15px 20px;
    align-items: flex-start;
    gap: 10px;
  }

  .nav-links {
    flex-direction: column;
    gap: 10px;
    width: 100%;
  }

  .nav-links li {
    font-size: 1rem;
  }

  .dashboard-container {
    padding: 20px;
  }

  .dashboard-title {
    font-size: 1.5rem;
    margin-bottom: 40px;
  }

  .dashboard-card {
    padding: 20px;
    min-height: 200px;
  }

  .dashboard-card h3 {
    font-size: 1.2rem;
  }

  .dashboard-card p {
    font-size: 1.5rem;
  }

  p.subHeading {
    font-size: 1rem;
  }

  .verification-title {
    font-size: 1.3rem;
  }

  .verify-buttons button {
    padding: 6px 12px;
    font-size: 0.9rem;
  }
}


/* =========================
   📱 TABLET (601px - 992px)
========================= */
@media (min-width: 601px) and (max-width: 992px) {

  .navbar {
    padding: 0 20px;
  }

  .nav-links {
    gap: 20px;
  }

  .dashboard-container {
    padding: 30px;
  }

  .dashboard-title {
    font-size: 1.8rem;
    margin-bottom: 60px;
  }

  .dashboard-card {
     grid-template-columns: repeat(2, 1fr);
    padding: 25px;
  }

  .dashboard-card h3 {
    font-size: 1.3rem;
  }

  .dashboard-card p {
    font-size: 1.8rem;
  }
}


/* =========================
   💻 LARGE SCREENS (1200px+)
========================= */
@media (min-width: 1200px) {

  .dashboard-container {
    padding: 60px 100px;
  }

  .dashboard-title {
    font-size: 2.5rem;
  }

  .dashboard-cards {
    gap: 30px;
  }

  .dashboard-card {
    padding: 40px;
    min-height: 320px;
  }

  .dashboard-card h3 {
    font-size: 1.6rem;
  }

  .dashboard-card p {
    font-size: 2.5rem;
  }

  p.subHeading {
    font-size: 1.3rem;
  }
}

  </style>
    <link rel="stylesheet" href="successIsland.css">
    <script src="successIsland.js"></script>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">LensLink<i class="fa-solid fa-camera-retro"></i></div>
    <ul class="nav-links" id="navLinks">
      <li>Dashboard</li>
      <li id="messagesNav" onclick="goMessage()">Messages</li>
      <li id="projectNav" onclick="goProjects()">Shoots</li>
      <li><a href="browseJob.html" style="text-decoration:none; color:inherit;">Browse Jobs</a></li>

    </ul>
    <!-- Username filled by JS -->
    <div style="display: flex; align-items: center; gap: 20px;">
      <div class="user-name" id="navUserName">Photographer</div>
      <button onclick="logout()"
        style="background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 600;">Logout</button>
    </div>
  </nav>

  <div id="verifyBanner"
    style="display:none; background: #ea580c; color: white; text-align: center; padding: 10px; font-weight: 600; position: sticky; top: 70px; z-index: 100;">
    <i class="fas fa-exclamation-circle"></i> Your email is not verified. Please check your inbox to verify your
    account.
  </div>

  <!-- MAIN -->
  <main class="dashboard-container">

    <h1 class="dashboard-title">Your Dashboard <i class="fa-solid fa-chart-line" style="color: #38bdf8"></i></h1>

    <section class="dashboard-cards">

      <div class="dashboard-card">
        <div>
          <h3>Upcoming Shoots <i class="fa-solid fa-camera" style="color: rgb(116, 192, 252);"></i>
          </h3>
          <!-- <p class="subHeading">Go to projects to see Ongoing Projects</p> -->
          <p id="ongoingProjects">0</p>
        </div>
      </div>

      <div class="dashboard-card">
        <div>
          <h3>Booking Requests <i class="fa-regular fa-bell fa-xs" style="color: rgb(116, 192, 252);"></i></h3>
          <!-- <p class="subHeading">There are no pending requests</p> -->
          <p id="pendingProjects">0</p>
        </div>
      </div>

      <div class="dashboard-card">
        <div>
          <h3>Total Earnings <i class="fa-solid fa-coins fa-xs" style="color: rgb(116, 192, 252);"></i></h3>
          <!-- <p class="subHeading">Start your first project to earn</p> -->
          <p id="totalEarnings">Rs 0</p>
        </div>
      </div>

      <div class="dashboard-card">
        <div>
          <h3>Unread Messages <i class="fa-regular fa-message fa-xs" style="color: rgb(116, 192, 252);"></i></h3>
          <!-- <p class="subHeading">There are no unread messages</p> -->
          <p id="unreadMessages">0</p>
        </div>
      </div>

    </section>
    <!-- PAYMENT VERIFICATION SECTION -->
    <section class="verification-section">

      <h2 class="verification-title">Payment Verification Requests</h2>

      <div id="verificationContainer"></div>

      <div id="loadMoreContainer" style="text-align: center; margin: 40px 0; display: none;">
        <button id="loadMoreBtn" onclick="loadMoreRequests()" style="background: #38bdf8; color: #020617; font-weight: bold; padding: 12px 30px; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s;">
          Load More Requests
        </button>
      </div>

    </section>
  </main>

  <script src="freelancerDashboard.js"></script>
</body>

</html>
