services:
  # BACKEND (Django API)
  - type: web
    name: skillbridge-api
    plan: free
    env: python
    buildCommand: "cd backend && ./render-build.sh"
    startCommand: "cd backend && gunicorn backend_core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillbridge-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: "backend_core.settings"
      # Add your Cloudinary keys in Render Dashboard env vars!
      # CLOUDINARY_CLOUD_NAME
      # CLOUDINARY_API_KEY
      # CLOUDINARY_API_SECRET
      # EMAIL_HOST_USER
      # EMAIL_HOST_PASSWORD

  # FRONTEND (Static Site)
  - type: static
    name: skillbridge-frontend
    plan: free
    env: static
    buildCommand: "" # No build step needed for pure HTML/JS
    publishPath: "Web-main"

databases:
  - name: skillbridge-db
    plan: free
    databaseName: skillbridge
    user: skillbridge_user
