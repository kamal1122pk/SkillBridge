<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script src="config.js"></script>
  <link rel="stylesheet" href="notifications.css">
  <script src="notifications.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Segoe UI, sans-serif;
      /* Firefox */
      scrollbar-width: thin;
      scrollbar-color: #38bdf8 #020617;
    }

    /* CUSTOM SCROLLBAR (Webkit) */
    ::-webkit-scrollbar {
      width: 7px;
    }
    ::-webkit-scrollbar-track {
      background: #020617;
    }
    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 10px;
      border: 1px solid #020617;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #38bdf8;
    }

    body {
      background: #020617;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* NAVBAR */
    .navbar {
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      border-bottom: 1px solid rgba(56, 189, 248, 0.3);
      position: sticky;
      top:0;
      background: #020617;
      z-index: 1000;
    }

    .logo {
      color: #38bdf8;
      font-weight: bold;
      font-size: 1.5rem;
    }

    .nav-links {
      display: flex;
      gap: 30px;
    }

    .nav-links a {
      text-decoration: none;
      color: #cbd5e1;
      font-weight: 350;
      font-size: larger;
    }

    .nav-links a:hover {
      color: #38bdf8;
    }

    /* MAIN LAYOUT */
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 28%;
      border-right: 1px solid rgba(56, 189, 248, 0.2);
      padding: 20px;
      overflow-y: auto;
    }

    .sidebar h2 {
      margin-bottom: 15px;
      position: sticky;
      top: 0;
      background: #020617;
      z-index: 10;
      padding-bottom: 10px;
    }
    .conversation {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
    }

    .conversation img {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }

    .conversation:hover {
      background: rgba(56, 189, 248, 0.1);
    }

    .conversation.active {
      background: rgba(56, 189, 248, 0.2) !important;
      border-left: 4px solid #38bdf8;
    }

    /* CHAT AREA */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 18px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(56, 189, 248, 0.2);
      position: sticky;
      top: 0;
      background: #020617;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-left img {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
    }

    .order-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: #020617;
      font-weight: 600;
      cursor: pointer;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 65%;
      padding: 12px 16px;
      border-radius: 16px;
      position: relative;
      font-size: .95rem;
    }

    .me {
      align-self: flex-end;
      background: #2563eb;
    }

    .other {
      align-self: flex-start;
      background: #0f172a;
      border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .time {
      font-size: .7rem;
      margin-top: 4px;
      opacity: .7;
    }

    .read {
      font-size: .65rem;
      margin-top: 2px;
      text-align: right;
      opacity: .6;
    }

    .chat-input {
      display: flex;
      gap: 10px;
      padding: 15px;
      border-top: 1px solid rgba(56, 189, 248, 0.2);
      position: sticky;
      bottom: 0;
      background: #020617;
      z-index: 10;
    }

    .chat-input input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #38bdf8;
      background: transparent;
      color: white;
      font-size: larger;
    }

    .chat-input button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: #020617;
      font-weight: 600;
      cursor: pointer;
    }


    .loader {
      border: 4px solid rgba(56, 189, 248, 0.1);
      border-left-color: #38bdf8;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      height: 100%;
      color: #94a3b8;
    }
    /* =========================
   📱 MOBILE (max 768px)
========================= */
@media (max-width: 768px) {

  /* NAVBAR */
  .navbar {
    padding: 0 15px;
  }

  .nav-links {
    gap: 15px;
  }

  .nav-links a {
    font-size: 0.9rem;
  }

  /* STACK LAYOUT */
  .container {
    flex-direction: column;
  }

  /* SIDEBAR (conversation list) */
  .sidebar {
    width: 100%;
    height: 40%;
    padding: 10px;
    border-right: none;
    border-bottom: 1px solid rgba(56, 189, 248, 0.2);
  }

  .sidebar h2 {
    font-size: 1.2rem;
  }

  .conversation {
    padding: 10px;
  }

  .conversation img {
    width: 32px;
    height: 32px;
  }

  /* CHAT AREA */
  .chat-area {
    height: 60%;
  }

  .chat-header {
    padding: 12px 15px;
  }

  .header-left img {
    width: 36px;
    height: 36px;
  }

  .order-btn {
    padding: 6px 10px;
    font-size: 0.8rem;
  }

  /* MESSAGES */
  .chat-box {
    padding: 12px;
    gap: 10px;
  }

  .msg {
    max-width: 80%;
    font-size: 0.85rem;
    padding: 10px 12px;
  }

  /* INPUT */
  .chat-input {
    padding: 10px;
    gap: 8px;
  }

  .chat-input input {
    padding: 10px;
    font-size: 0.9rem;
  }

  .chat-input button {
    padding: 10px 12px;
    font-size: 0.9rem;
  }
}
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">SkillBridge</div>
    <div class="nav-links" id="navLinks">
      <!-- Dynamic links will be injected here -->
    </div>
  </div>

  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <h2>Messages</h2>
      <div id="conversationList"></div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area">
      <div class="chat-header">
        <div class="header-left">
          <img id="chatAvatar" src="" />
          <div>
            <div id="chatName"></div>
            <div style="color:#22c55e;font-size:.8rem">Online</div>
          </div>
        </div>
        <button class="order-btn" onclick="placeOrder()">Place Order</button>
      </div>

      <div class="chat-box" id="chatBox"></div>

      <div class="chat-input">
        <input type="text" id="msgInput" placeholder="Type a message..." maxlength="500" />
        <button onclick="sendMessage()">Send</button>
      </div>

    </div>

  </div>

  <script src="chat.js"></script>

</body>

</html>
