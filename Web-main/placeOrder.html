<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Order</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script src="config.js"></script>
  <link rel="stylesheet" href="notifications.css">
  <script src="notifications.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
      /* Firefox */
      scrollbar-width: thin;
      scrollbar-color: #38bdf8 #020617;
    }

    /* CUSTOM SCROLLBAR (Webkit) */
    ::-webkit-scrollbar {
      width: 7px;
    }
    ::-webkit-scrollbar-track {
      background: #020617;
    }
    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 10px;
      border: 1px solid #020617;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #38bdf8;
    }

    body {
      background: #020617;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: linear-gradient(145deg, #0f172a, #020617);
      border: 1px solid #38bdf8;
      border-radius: 18px;
      padding: 36px 30px;
      width: 100%;
      max-width: 500px;
      margin: 40px 20px;
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.25);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      color: #38bdf8;
      font-size: 1.9rem;
      margin-bottom: 20px;
      text-align: center;
    }

    label {
      display: block;
      width: 100%;
      text-align: left;
      margin-bottom: 6px;
      margin-top: 12px;
      font-weight: 600;
      color: #cde2eb;
    }

    input, textarea {
      width: 100%;
      padding: 13px 14px;
      border-radius: 8px;
      border: 1.5px solid rgba(56, 189, 248, 0.25);
      background: #020617;
      color: white;
      font-size: 15px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #38bdf8;
    }

    textarea {
      resize: none;
      height: 140px;
    }

    .submit-btn {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: #020617;
      font-weight: 700;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }

    .submit-btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* SUCCESS ISLAND */
    .island-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.88);
      backdrop-filter: blur(8px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      animation: fadeIn 0.35s ease-out;
    }

    .island-overlay.visible { display: flex; }

    .island-box {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(56, 189, 248, 0.4);
      border-radius: 24px;
      padding: 40px 36px;
      width: 90%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(56,189,248,0.15);
      animation: scaleUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleUp { from { transform: scale(0.9); } to { transform: scale(1); } }

    .island-icon { font-size: 52px; color: #22c55e; margin-bottom: 18px; }
    .island-title { font-size: 1.6rem; color: #38bdf8; font-weight: 700; margin-bottom: 10px; }
    .island-sub { color: #94a3b8; line-height: 1.6; margin-bottom: 10px; }

    .island-order-id {
      background: rgba(56, 189, 248, 0.08);
      border: 1px solid rgba(56, 189, 248, 0.25);
      border-radius: 10px;
      padding: 10px 16px;
      margin: 14px 0 26px;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .island-order-id strong { color: #38bdf8; font-size: 1.1rem; letter-spacing: 0.5px; }

    .island-buttons { display: flex; flex-direction: column; gap: 12px; }

    .btn-primary {
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #38bdf8;
      color: #020617;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-primary:hover { background: #7dd3fc; transform: translateY(-2px); }

    .btn-secondary {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(56, 189, 248, 0.3);
      background: rgba(255,255,255,0.04);
      color: #38bdf8;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-secondary:hover { background: rgba(56,189,248,0.1); }
    /* =========================
   📱 MOBILE (max 600px)
========================= */
@media (max-width: 600px) {

  /* BODY FIX (important) */
  body {
    align-items: flex-start; /* don't vertically center */
    padding: 20px 0;
  }

  /* CARD */
  .card {
    width: 95%;
    margin: 20px auto;
    padding: 22px 18px;
    border-radius: 14px;
  }

  h2 {
    font-size: 1.5rem;
  }

  /* FORM */
  label {
    font-size: 0.9rem;
  }

  input,
  textarea {
    font-size: 0.95rem;
    padding: 11px;
  }

  textarea {
    height: 120px;
  }

  /* BUTTON */
  .submit-btn {
    padding: 12px;
    font-size: 0.95rem;
  }

  /* SUCCESS MODAL */
  .island-box {
    width: 92%;
    padding: 25px 20px;
    border-radius: 18px;
  }

  .island-icon {
    font-size: 40px;
  }

  .island-title {
    font-size: 1.3rem;
  }

  .island-sub {
    font-size: 0.9rem;
  }

  .island-order-id {
    font-size: 0.8rem;
    padding: 8px 12px;
  }

  .btn-primary,
  .btn-secondary {
    padding: 12px;
    font-size: 0.9rem;
  }
}
  </style>
<link rel="stylesheet" href="light-theme.css"></head>

<body>

  <!-- ORDER FORM -->
  <div class="card" id="orderCard">
    <h2>Book Photographer</h2>

    <label>Photography Type</label>
      <input type="text" id="shootType" placeholder="e.g. Wedding, Birthday, Portrait">
      </select>

      <label>Shoot Location</label>
      <input type="text" id="location" placeholder="e.g. Hyderabad, MUET">

      <label>Shoot Date</label>
      <input type="date" id="deadline">

      <label>Budget (PKR)</label>
      <input type="number" id="amount" placeholder="e.g. 5000">

    <button class="submit-btn" id="confirmBtn" onclick="confirmOrder()">Confirm Booking</button>
  </div>

  <!-- SUCCESS ISLAND -->
  <div class="island-overlay" id="successIsland">
    <div class="island-box">
      <div class="island-icon"><i class="fas fa-check-circle"></i></div>
      <div class="island-title">Confirmed!</div>
      <p class="island-sub">Proceed to payment to get started.</p>

      <div class="island-order-id">
        Order ID &nbsp;·&nbsp; <strong id="orderIdDisplay">—</strong>
      </div>

      <div class="island-buttons">
        <button class="btn-primary" onclick="goToPayment()">
          <i class="fas fa-credit-card" style="margin-right:8px;"></i>Proceed to Payment
        </button>
        <button class="btn-secondary" onclick="goDashboard()">Back to Dashboard</button>
      </div>
    </div>
  </div>

  <script src="placeOrder.js"></script>
</body>
</html>
